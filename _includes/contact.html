{% assign ct = site.sections | where: "slug", "contact" | first %}

<section id="contact" class="section section--alt">
  <div class="container">
    <div class="contact-inner reveal">
      <div class="contact-text-block">
        <p class="section-label">Get in touch</p>
        <h2 class="section__title">{{ ct.tagline }}</h2>
        <p class="contact-desc">{{ ct.description }}</p>
      </div>
      <div class="contact-links">
        {% for link in ct.links %}
          <a class="btn {% if forloop.first %}btn--primary{% else %}btn--ghost{% endif %}"
             href="{{ link.href }}"
             {% if link.external %}target="_blank" rel="noopener noreferrer"{% endif %}>
            {% include icon.html name=link.icon %}
            {{ link.label }}
          </a>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
