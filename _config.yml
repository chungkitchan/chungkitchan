title: Chloe Chan
description: Music Composition for Film, TV & Games — Berklee College of Music
url: ""
baseurl: ""

# ── Theme ──────────────────────────────────────────────────────
# GitHub Pages supported theme
theme: minima

# Minima skin — change here to restyle the whole site.
# Options: classic | dark | solarized | solarized-dark | auto
minima:
  skin: dark

# Author details used in the theme
author:
  name: Chloe Chan
  email: hello@chloechan.music

# Social links rendered by minima
header_pages:
  - index.md

# ── Collections ────────────────────────────────────────────────
# Each file in _sections/ is an editable content section.
# biography.md and contact.md live here — edit them in any text editor.
collections:
  sections:
    output: false   # sections are included, not standalone pages

# ── Plugins (GitHub Pages safe-list) ──────────────────────────
plugins:
  - jekyll-feed

# ── Build ──────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: pretty

# Exclude from build
exclude:
  - instructions.md
  - "*.DS_Store"
  - Gemfile
  - Gemfile.lock
