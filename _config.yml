# ── Layout ─────────────────────────────────────────────────────
# Controls column structure and spacing across the page.
#
# bio_columns:
#   2col     — text left, highlight cards right (default)
#   1col     — single centred column, stacked
#   sidebar  — narrow text left (1fr), wide highlights right (2fr)
#
# portfolio_columns:
#   auto     — responsive auto-fill (~3 cols on desktop, scales down)
#   2col     — always 2 columns
#   3col     — always 3 columns
#   1col     — single column list
#
# hero_style:
#   centered — full-width centred text (default)
#   left     — left-aligned text, padded
#
# max_width:   max page content width (any CSS value)
# card_radius: border-radius for cards and buttons (any CSS value)
# section_gap: vertical padding inside each section (any CSS value)

layout:
  bio_columns:       "2col"
  portfolio_columns: "auto"
  hero_style:        "centered"
  max_width:         "960px"
  card_radius:       "12px"
  section_gap:       "5rem"

# Author details
author:
  name: Chloe Chan
  email: hello@chloechan.music

# ── Collections ────────────────────────────────────────────────
# Each file in _sections/ is an editable content section.
# biography.md and contact.md live here — edit them in any text editor.
collections:
  sections:
    output: false   # sections are included, not standalone pages

# ── Build ──────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: pretty

# Exclude from build
exclude:
  - instructions.md
  - README.md
  - "*.DS_Store"
  - Gemfile
  - Gemfile.lock
