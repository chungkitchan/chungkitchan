<header class="header">
  <div class="container">
    <div class="header__inner">

      <a class="logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>

      <nav class="main-nav" aria-label="Main navigation">
        <ul class="nav__list">
          <li><a href="{{ '/#hero'      | relative_url }}" class="nav__link">Home</a></li>
          <li><a href="{{ '/#about'     | relative_url }}" class="nav__link">About</a></li>
          <li><a href="{{ '/#portfolio' | relative_url }}" class="nav__link">Portfolio</a></li>
          <li><a href="{{ '/#contact'   | relative_url }}" class="nav__link">Contact</a></li>
        </ul>
      </nav>

      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 1 0 9.79 9.79z"/>
        </svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>

    </div>
  </div>
</header>

<script>
  // Hamburger for mobile
  document.getElementById('hamburger').addEventListener('click', function() {
    document.querySelector('.main-nav').classList.toggle('is-open');
  });
</script>
