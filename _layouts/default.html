<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title | escape }} — {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  <script>
    // Apply saved theme before render to avoid flash
    (function() {
      var saved = localStorage.getItem('chloe-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
</head>
<body>

  {% include nav.html %}

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>&copy; <span id="footer-year"></span> {{ site.title }}. All rights reserved.</span>
    </div>
  </footer>

  <script>window.SITE_BASEURL = "{{ site.baseurl }}";</script>
  <script src="{{ '/assets/js/portfolio.js' | relative_url }}"></script>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();
    // Theme toggle
    var btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.addEventListener('click', function() {
        var html = document.documentElement;
        var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('chloe-theme', next);
      });
    }
  </script>
</body>
</html>
