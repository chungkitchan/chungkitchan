{% assign bio = site.sections | where: "slug", "biography" | first %}

<section id="about" class="section section--alt">
  <div class="container">
    <div class="section__head reveal">
      <p class="section-label">About me</p>
      <h2 class="section__title">{{ bio.title }}</h2>
    </div>
    <div class="bio-grid reveal">
      <div class="bio-text">
        {{ bio.content }}
      </div>
      <div class="bio-highlights">
        {% for h in bio.highlights %}
          <div class="highlight-card">
            <div class="hi-icon hi-icon--{{ h.color }}">{{ h.icon }}</div>
            <div class="hi-body">
              <strong>{{ h.heading }}</strong>
              <span>{{ h.detail }}</span>
            </div>
          </div>
        {% endfor %}
        <div class="influences">
          <p class="widget__heading">Influences</p>
          <div class="tag-row">
            {% for inf in bio.influences %}
              <span class="tag tag-{{ forloop.index0 | modulo: 6 }}">{{ inf }}</span>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
